<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Beechwood Solutions India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }
        .admin-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .admin-body {
            padding: 40px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .btn-admin-login {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .security-badge {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }
        .company-tagline {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1e293b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .forgot-password {
            text-align: right;
            margin-top: 5px;
        }
        .forgot-password a {
            color: #1e293b;
            text-decoration: none;
            font-size: 12px;
        }
        .form-label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }
        .input-group-text {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .admin-note {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 10px;
            font-size: 12px;
            margin-top: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="admin-login-card">
                    <div class="admin-header">
                        <div class="logo-container">
                            <img src="assets/images/beechwood_logo.png" alt="Beechwood Solutions">
                        </div>
                        <h3>Admin Portal</h3>
                        <p class="mb-0">Beechwood Solutions India</p>
                        <div class="company-tagline">
                            <i class="fas fa-shield-alt me-1"></i> Attendance Management System
                        </div>
                    </div>
                    <div class="admin-body">
                        <form id="adminLoginForm">
                            <div class="mb-3">
                                <label class="form-label">Admin Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="adminEmail" 
                                           placeholder="Enter your admin email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="adminPassword" 
                                           placeholder="Enter your password" required>
                                </div>
                                <div class="forgot-password">
                                    <a href="forgot-password.html">Forgot Password?</a>
                                </div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberAdmin">
                                <label class="form-check-label">Remember me</label>
                            </div>
                            
                            <div class="back-link">
                                <a href="index.html">
                                    <i class="fas fa-arrow-left me-1"></i> Back to Role Selection
                                </a>
                            </div>

                            <button type="submit" class="btn-admin-login">
                                <i class="fas fa-sign-in-alt me-2"></i> Access Admin Panel
                            </button>
                            
                            <div class="admin-note">
                                <i class="fas fa-info-circle me-1"></i>
                                <strong>Note:</strong> Admin accounts can only be created by existing administrators from the Admin Panel.
                            </div>
                            
                            <div class="security-badge mt-3">
                                <i class="fas fa-lock me-1"></i> Secure Admin Access Only
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <a href="employee-login.html" class="text-decoration-none small">
                                <i class="fas fa-user"></i> Employee Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
     <script src="js/socket.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
