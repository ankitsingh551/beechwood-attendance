<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password</title>

    <script src="js/api.js"></script>
    <script defer src="js/reset-password.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(
                    135deg,
                    #667eea 0%,
                    #764ba2 100%
                );
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 40px 30px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #222;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dcdcdc;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow:
                0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .password-hint {
            margin-top: 8px;
            font-size: 12px;
            color: #777;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background:
                linear-gradient(
                    135deg,
                    #667eea,
                    #764ba2
                );
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .success {
            background: #e7f8ee;
            color: #0f7b3f;
        }

        .error {
            background: #ffeaea;
            color: #d93025;
        }

        .footer-text {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        @media (max-width: 480px) {

            .card {
                padding: 30px 22px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <div class="logo">
                🔒
            </div>

            <h2>Reset Password</h2>

            <p class="subtitle">
                Enter your new secure password
            </p>

            <div class="form-group">

                <label for="password">
                    New Password
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter new password"
                >

                <div class="password-hint">
                    Password should contain at least 6 characters
                </div>

            </div>

            <button id="resetBtn">
                Reset Password
            </button>

            <div id="messageBox" class="message"></div>

            <div class="footer-text">
                Beechwood Solutions India
            </div>

        </div>

    </div>

</body>

</html>
