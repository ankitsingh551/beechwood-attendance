<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Beechwood Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar">
                <div class="position-sticky pt-4">
                    <div class="text-center mb-4">
                        <img src="assets/images/beechwood_logo.png" 
                             alt="Beechwood Solutions" 
                             class="img-fluid" 
                             style="width: 80px; height: 80px; object-fit: contain; border-radius: 50%; background: white; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                        <h5 class="text-white mt-2">Beechwood Solutions India</h5>
                        <p class="text-white-50 small">Employee Portal</p>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="employee-dashboard.html">
                                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="employee-attendance.html">
                                <i class="fas fa-calendar-check me-2"></i> My Attendance
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="employee-leaves.html">
                                <i class="fas fa-plane me-2"></i> My Leaves
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="employee-profile.html">
                                <i class="fas fa-user me-2"></i> My Profile
                            </a>
                        </li>

                        <hr class="bg-light">
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="#" id="logoutBtn">
                                <i class="fas fa-sign-out-alt me-2"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">My Profile</h1>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" id="editProfileBtn">
                            <i class="fas fa-edit"></i> Edit Profile
                        </button>

                        <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                            <i class="fas fa-lock"></i> Change Password
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow text-center">
                            <div class="card-body">
                                <img src="https://ui-avatars.com/api/?background=667eea&color=fff&size=150&name=Employee" 
                                     class="rounded-circle mb-3" width="150" height="150" id="profileImage">
                                <h4 id="profileName">Loading...</h4>
                                <p class="text-muted" id="profileDesignation">-</p>
                                <p><span class="badge bg-primary" id="profileDepartment">-</span></p>
                                <hr>
                                <p><i class="fas fa-envelope"></i> <span id="profileEmail">-</span></p>
                                <p><i class="fas fa-id-card"></i> <span id="profileEmployeeId">-</span></p>
                                <p><i class="fas fa-phone"></i> <span id="profilePhone">-</span></p>
                                <p><i class="fas fa-calendar-alt"></i> Joined: <span id="profileJoining">-</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow mb-4">
                            <div class="card-header">
                                <h5>Attendance Summary</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="profileChart" height="200"></canvas>
                            </div>
                        </div>
                        <div class="card shadow">
                            <div class="card-header">
                                <h5>Recent Activity</h5>
                            </div>
                            <div class="card-body">
                                <div id="recentActivity">
                                    <p class="text-muted text-center">Loading activity...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
                <!-- Change Password Modal -->
            <div class="modal fade" id="changePasswordModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="currentPassword">
                    </div>

                    <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword">
                    </div>

                    <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword">
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" id="updatePasswordBtn">Update Password</button>
                </div>
                </div>
            </div>
            </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/socket.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/employee-profile.js"></script>
</body>
</html>
