<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beechwood Solutions India - Attendance System</title>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .role-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .role-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .admin-icon {
            color: #1e293b;
        }
        
        .employee-icon {
            color: #667eea;
        }
        
        .btn-role {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn-role:hover {
            transform: scale(1.05);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-container img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: white;
            border-radius: 50%;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .company-name {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .role-card {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="assets/images/beechwood_logo.png" alt="Beechwood Solutions">
            <div class="company-name">Beechwood Solutions India</div>
            <div class="tagline">Attendance Management System</div>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="role-card" onclick="selectRole('admin')">
                    <div class="role-icon">
                        <i class="fas fa-shield-alt admin-icon"></i>
                    </div>
                    <h3>Admin Portal</h3>
                    <p class="text-muted">Manage employees, attendance, leaves, and generate reports</p>
                    <button class="btn-role">
                        <i class="fas fa-sign-in-alt me-2"></i> Login as Admin
                    </button>
                </div>
            </div>
            
            <div class="col-md-5 mb-4">
                <div class="role-card" onclick="selectRole('employee')">
                    <div class="role-icon">
                        <i class="fas fa-user-tie employee-icon"></i>
                    </div>
                    <h3>Employee Portal</h3>
                    <p class="text-muted">Mark attendance, request leaves, view your attendance history</p>
                    <button class="btn-role">
                        <i class="fas fa-sign-in-alt me-2"></i> Login as Employee
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
     <script src="js/socket.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
